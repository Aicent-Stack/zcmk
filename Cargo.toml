[package]
name = "zcmk"
description = "ZCMK: Real-Time Bid/Ask (RTBA) Zero-Commission Settlement Protocol [RFC-004]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://zcmk.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-004-ZCMK-BLOOD.md"
keywords = ["sovereign-ai", "picotoken", "zero-commission", "rtba", "economic-homeostasis"]
categories = ["financial-services", "algorithms", "distributed-computing"]
rust-version = "1.75"

[dependencies]
# --- Core Organism Linking ---
# ZCMK is the blood of the organism; it clears value atomically with neural pulses.
rttp = { workspace = true }
aicent = { workspace = true }

# --- HFT-Grade Matching Engine ---
# [PERF] Lock-free primitives for nanosecond-speed auctions and settlements.
crossbeam-queue = { workspace = true }
parking_lot = { workspace = true } # HFT-grade synchronization for auction manifold
once_cell = { workspace = true }   # Safe static initialization of the market 

# --- Financial Precision ---
# Precision math for 10^-12 (picotoken) granularity
num-traits = { version = "0.2", default-features = false }

# --- Logic & Telemetry ---
serde = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt"] }
rand = { workspace = true }        # Chaos-testing market price discovery
tracing = { workspace = true }     # Financial audit trails

[features]
default = ["std"]
std = ["serde/std", "anyhow/std", "rttp/std"]
# [RFC-006] Enable metabolic shunting across the global operational grid
hive-metabolism = []

[dev-dependencies]
# Benchmarking finality latency (<1ms targets)
criterion = { workspace = true }
